name: CI/CD - Provider Optimizer Service

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore Entregable_2_Microservicio/Asisya.ProviderOptimizer.Api/Asisya.ProviderOptimizer.Api.csproj

    - name: Build Project
      run: |
        dotnet build Entregable_2_Microservicio/Asisya.ProviderOptimizer.Api/Asisya.ProviderOptimizer.Api.csproj \
          --configuration Release \
          --no-restore

    - name: Validate Code Formatting
      working-directory: Entregable_2_Microservicio
      run: dotnet format --verify-no-changes
      
    - name: Run Unit & Integration Tests (Testcontainers)
      run: |
        dotnet test Entregable_2_Microservicio/Asisya.ProviderOptimizer.Tests/Asisya.ProviderOptimizer.Tests.csproj \
          --configuration Release \
          --no-build \
          --verbosity normal

  docker-build-and-push:
    name: Build Docker & Push to AWS ECR
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image (Alpine Multi-Stage)
      working-directory: Entregable_2_Microservicio
      run: |
        docker build -t asisya-provider-optimizer:${{ github.sha }} -f Asisya.ProviderOptimizer.Api/Dockerfile .

